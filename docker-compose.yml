# =============================================================================
# ArxPrism Docker Compose - Full Containerized Microservices
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # Neo4j Graph Database
  # ===========================================================================
  neo4j:
    image: neo4j:5.18
    container_name: arxprism-neo4j
    ports:
      - "7474:7474"  # Neo4j Browser HTTP
      - "7687:7687"  # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    networks:
      - arxprism-network
    restart: unless-stopped

  # ===========================================================================
  # Redis Message Broker
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: arxprism-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - arxprism-network
    restart: unless-stopped

  # ===========================================================================
  # FastAPI Backend Service
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arxprism-api
    ports:
      - "8000:8000"  # FastAPI
    environment:
      # LLM (preferred): configure multi-provider via OpenAI-compatible API
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      - LOG_LEVEL=INFO
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - arxprism-network
    restart: unless-stopped
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2

  # ===========================================================================
  # Celery Worker Service
  # ===========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arxprism-worker
    environment:
      # LLM (preferred): configure multi-provider via OpenAI-compatible API
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=production
      - LOG_LEVEL=INFO
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arxprism-network
    restart: unless-stopped
    command: >
      celery -A src.worker.tasks worker
      --loglevel=info
      --concurrency=4
      --prefetch-multiplier=1
    # Mount source for development (remove in production)
    volumes:
      - ./src:/home/appuser/app/src:ro

  # ===========================================================================
  # Next.js Frontend Service
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: arxprism-frontend
    ports:
      - "3000:3000"  # Next.js
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=production
      - APP_ENV=production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - arxprism-network
    restart: unless-stopped

# =============================================================================
# Networks
# =============================================================================
networks:
  arxprism-network:
    driver: bridge
    name: arxprism-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  neo4j_data:
    name: arxprism-neo4j-data
  neo4j_logs:
    name: arxprism-neo4j-logs
  redis_data:
    name: arxprism-redis-data
